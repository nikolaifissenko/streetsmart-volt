name: Build GeoJSON

on:
  push:
    branches: [main]
    paths:
      - 'data/master/streetsmart_roma_completo.csv'
  workflow_dispatch:  # permette di avviare manualmente da GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necessario per fare commit del GeoJSON

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validate.py
        run: python scripts/validate.py

      - name: Run build.py
        run: python scripts/build.py

      - name: Run export_api.py
        run: python scripts/export_api.py

      - name: Run stats.py
        run: python scripts/stats.py

      - name: Run generate_one_pager.py
        run: python scripts/generate_one_pager.py

      - name: Commit e push GeoJSON/API/stats aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/streetsmart_roma.geojson data/master/.geocode_cache.json dist/api docs/stats.md docs/stats.json docs/one_pager_tech.md
          git diff --staged --quiet || git commit -m "Auto: aggiorna GeoJSON, API, stats e one-pager [skip ci]"
          git push
